<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Live Class – Dr Shetye Academic Programme</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: #0d0d1a; color: #fff; min-height: 100vh; display: flex; flex-direction: column; }

    .topbar {
      background: #16213e;
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 16px;
      border-bottom: 1px solid rgba(255,255,255,.08);
    }
    .topbar-brand { display: flex; align-items: center; gap: 10px; }
    .topbar-title { font-size: 14px; font-weight: 700; }
    .topbar-sub { font-size: 11px; color: rgba(255,255,255,.5); }
    .back-link { color: rgba(255,255,255,.6); text-decoration: none; font-size: 13px; }
    .back-link:hover { color: #fff; }

    .live-badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: #ff4757; color: #fff;
      font-size: 11px; font-weight: 700; letter-spacing: .8px;
      padding: 4px 12px; border-radius: 20px; text-transform: uppercase;
    }
    .live-dot {
      width: 7px; height: 7px; background: #fff; border-radius: 50%;
      animation: pulse 1.2s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.75)} }

    .main { flex: 1; padding: 16px; max-width: 860px; margin: 0 auto; width: 100%; }

    .status-bar { margin-bottom: 14px; min-height: 28px; }

    .video-wrap { background: #000; border-radius: 12px; overflow: hidden; margin-bottom: 16px; }
    .video-ratio { position: relative; width: 100%; padding-bottom: 56.25%; }
    .video-ratio iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: none; }

    .offline-wrap {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; min-height: 260px;
      text-align: center; padding: 40px 16px;
    }
    .offline-icon { font-size: 52px; margin-bottom: 14px; }
    .offline-title { font-size: 18px; font-weight: 700; margin-bottom: 8px; color: rgba(255,255,255,.85); }
    .offline-sub { font-size: 14px; color: rgba(255,255,255,.45); line-height: 1.6; }

    .btn-row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 16px; }
    .action-btn {
      flex: 1; min-width: 140px;
      display: flex; align-items: center; justify-content: center; gap: 7px;
      padding: 12px 16px; border-radius: 10px;
      font-size: 13px; font-weight: 700; text-decoration: none;
      transition: opacity .15s;
    }
    .action-btn:hover { opacity: .85; }
    .btn-yt { background: #ff0000; color: #fff; }
    .btn-wa { background: #25d366; color: #fff; }

    .tips {
      background: rgba(255,255,255,.04); border-radius: 12px;
      padding: 16px; border: 1px solid rgba(255,255,255,.07);
    }
    .tips-title { font-size: 12px; font-weight: 700; color: rgba(255,255,255,.4); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 12px; }
    .tips-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 10px; }
    .tip { font-size: 12px; color: rgba(255,255,255,.5); display: flex; gap: 8px; align-items: flex-start; }
    .tip-icon { font-size: 16px; flex-shrink: 0; }

    .footer { text-align: center; font-size: 11px; color: rgba(255,255,255,.25); padding: 20px 16px; }

    /* Loading spinner */
    .spinner {
      width: 36px; height: 36px; border: 3px solid rgba(255,255,255,.15);
      border-top-color: #ff4757; border-radius: 50%;
      animation: spin .8s linear infinite; margin: 60px auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div class="topbar">
    <div class="topbar-brand">
      <span style="font-size:20px;">🎓</span>
      <div>
        <div class="topbar-title">Dr Shetye Academic Programme</div>
        <div class="topbar-sub">GSSC · GPSC · Govt Exam Preparation</div>
      </div>
    </div>
    <a href="index.html" class="back-link">← Home</a>
  </div>

  <div class="main">
    <div class="status-bar" id="statusBar"></div>
    <div id="videoArea"><div class="spinner"></div></div>
    <div class="btn-row" id="btnRow"></div>
    <div class="tips">
      <div class="tips-title">💡 Tips for Best Experience</div>
      <div class="tips-grid">
        <div class="tip"><div class="tip-icon">📶</div><div>Use WiFi for smooth video</div></div>
        <div class="tip"><div class="tip-icon">🎧</div><div>Headphones for better audio</div></div>
        <div class="tip"><div class="tip-icon">📝</div><div>Keep pen &amp; paper ready</div></div>
        <div class="tip"><div class="tip-icon">🔕</div><div>Mute other notifications</div></div>
      </div>
    </div>
  </div>

  <div class="footer">Dr Shetye Academic Programme · Maitreya Hinde · 📞 7358425108</div>

  <script src="config.js"></script>
  <script>
    function extractYTId(url) {
      if (!url) return null;
      var pp = [/youtu\.be\/([A-Za-z0-9_\-]{11})/, /[?&]v=([A-Za-z0-9_\-]{11})/, /live\/([A-Za-z0-9_\-]{11})/, /embed\/([A-Za-z0-9_\-]{11})/];
      for (var i = 0; i < pp.length; i++) { var m = url.match(pp[i]); if (m) return m[1]; }
      if (/^[A-Za-z0-9_\-]{11}$/.test(url.trim())) return url.trim();
      return null;
    }

    function render(data) {
      var statusBar = document.getElementById('statusBar');
      var videoArea = document.getElementById('videoArea');
      var btnRow    = document.getElementById('btnRow');

      if (!data || !data.active || !data.url) {
        statusBar.innerHTML = '';
        videoArea.innerHTML =
          '<div class="offline-wrap">' +
            '<div class="offline-icon">📡</div>' +
            '<div class="offline-title">No Live Class Right Now</div>' +
            '<div class="offline-sub">A class will appear here when the teacher goes live.<br>Join our WhatsApp channel for announcements.</div>' +
          '</div>';
        btnRow.innerHTML =
          '<a href="https://whatsapp.com/channel/0029VbCxs1P9RZAT256BYG1P" target="_blank" class="action-btn btn-wa">💬 Join WhatsApp Channel</a>';
        return;
      }

      var ytId = extractYTId(data.url);
      statusBar.innerHTML = '<div class="live-badge"><span class="live-dot"></span> CLASS IS LIVE NOW</div>';

      if (ytId) {
        videoArea.innerHTML =
          '<div class="video-wrap"><div class="video-ratio">' +
            '<iframe src="https://www.youtube.com/embed/' + ytId + '?autoplay=1&rel=0" ' +
            'allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>' +
          '</div></div>';
      } else {
        videoArea.innerHTML =
          '<div class="offline-wrap">' +
            '<div class="offline-icon">⚠️</div>' +
            '<div class="offline-title">Could not load player</div>' +
            '<div class="offline-sub">Tap the YouTube button below to watch directly.</div>' +
          '</div>';
      }

      btnRow.innerHTML =
        '<a href="' + data.url + '" target="_blank" class="action-btn btn-yt">▶ Open on YouTube</a>' +
        '<a href="https://whatsapp.com/channel/0029VbCxs1P9RZAT256BYG1P" target="_blank" class="action-btn btn-wa">💬 WhatsApp</a>';
    }

    // Fetch stream info from Google Apps Script
    fetch(SCRIPT_URL + '?action=getStream')
      .then(function(r){ return r.json(); })
      .then(function(res){ render(res); })
      .catch(function(){ render(null); });
  </script>
</body>
</html>
