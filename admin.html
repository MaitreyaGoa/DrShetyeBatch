<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Panel – Dr Shetye Academic Programme</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet"/>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    html{scroll-behavior:smooth;-webkit-font-smoothing:antialiased;}
    body{font-family:'Inter',system-ui,sans-serif;background:#f5f5f7;color:#1d1d1f;min-height:100vh;}

    /* ── HEADER ── */
    .adm-header{
      background:rgba(245,245,247,0.94);
      backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
      border-bottom:1px solid rgba(0,0,0,0.09);
      position:sticky;top:0;z-index:100;
      padding:0 32px;
    }
    .adm-header-inner{
      max-width:1280px;margin:0 auto;
      display:flex;align-items:center;justify-content:space-between;
      height:56px;gap:16px;
    }
    .adm-brand{display:flex;align-items:center;gap:10px;}
    .adm-brand-icon{
      width:32px;height:32px;border-radius:8px;
      background:linear-gradient(135deg,#0071e3,#5ac8fa);
      display:flex;align-items:center;justify-content:center;
      font-size:16px;color:#fff;flex-shrink:0;
    }
    .adm-brand-name{font-size:13px;font-weight:700;color:#1d1d1f;letter-spacing:-0.2px;}
    .adm-brand-sub{font-size:10px;color:#86868b;margin-top:1px;}
    .adm-header-actions{display:flex;align-items:center;gap:8px;}
    .adm-back{
      font-size:12px;font-weight:500;color:#86868b;
      background:transparent;border:1px solid rgba(0,0,0,0.1);
      border-radius:7px;padding:5px 12px;cursor:pointer;
      text-decoration:none;transition:all 0.15s;
    }
    .adm-back:hover{background:rgba(0,0,0,0.04);color:#1d1d1f;}

    /* ── LAYOUT ── */
    .adm-layout{
      max-width:1280px;margin:0 auto;
      padding:24px 32px 60px;
      display:grid;
      grid-template-columns:260px 1fr;
      gap:20px;
      align-items:start;
    }
    @media(max-width:900px){
      .adm-layout{grid-template-columns:1fr;padding:16px;}
      .adm-sidebar{position:static!important;}
    }

    /* ── SIDEBAR ── */
    .adm-sidebar{
      position:sticky;top:72px;
      background:#fff;
      border-radius:16px;
      border:1px solid rgba(0,0,0,0.08);
      overflow:hidden;
    }
    .adm-sidebar-hdr{
      padding:14px 16px 10px;
      border-bottom:1px solid rgba(0,0,0,0.06);
    }
    .adm-sidebar-title{font-size:11px;font-weight:700;color:#86868b;text-transform:uppercase;letter-spacing:1.5px;}

    /* category group */
    .adm-cat{border-bottom:1px solid rgba(0,0,0,0.05);}
    .adm-cat:last-child{border-bottom:none;}
    .adm-cat-label{
      display:flex;align-items:center;gap:8px;
      padding:10px 16px 6px;
      font-size:10px;font-weight:700;color:#86868b;
      text-transform:uppercase;letter-spacing:1px;
    }
    .adm-cat-dot{
      width:6px;height:6px;border-radius:50%;
      background:var(--cd,#86868b);flex-shrink:0;
    }

    .adm-tab{
      display:flex;align-items:center;justify-content:space-between;
      width:100%;padding:8px 16px 8px 24px;
      background:transparent;border:none;
      font-family:'Inter',sans-serif;
      font-size:12px;font-weight:500;color:#3a3a3c;
      text-align:left;cursor:pointer;
      transition:background 0.12s,color 0.12s;
      gap:6px;
    }
    .adm-tab:hover{background:#f5f5f7;color:#1d1d1f;}
    .adm-tab.active{
      background:#f0f6ff;color:#0071e3;font-weight:600;
    }
    .adm-tab.active .adm-tab-text{color:#0071e3;}
    .adm-tab-text{flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .adm-tab-live{
      font-size:9px;font-weight:700;color:#34c759;
      background:#e8f8ec;border-radius:4px;padding:1px 5px;flex-shrink:0;
    }
    .adm-tab-soon{
      font-size:9px;color:#aeaeb2;
      background:#f5f5f7;border-radius:4px;padding:1px 5px;flex-shrink:0;
    }

    /* ── RESULTS PANEL ── */
    .adm-panel{
      background:#fff;
      border-radius:16px;
      border:1px solid rgba(0,0,0,0.08);
      min-height:500px;
      overflow:hidden;
    }

    .adm-panel-header{
      display:flex;align-items:flex-start;justify-content:space-between;
      padding:20px 24px 16px;
      border-bottom:1px solid rgba(0,0,0,0.07);
      flex-wrap:wrap;gap:12px;
    }
    .adm-panel-title{font-size:17px;font-weight:700;color:#1d1d1f;letter-spacing:-0.3px;margin-bottom:3px;}
    .adm-panel-meta{font-size:12px;color:#86868b;}
    .adm-panel-actions{display:flex;gap:8px;flex-shrink:0;}

    .btn-export{
      padding:7px 14px;background:#f0f6ff;color:#0071e3;
      border:1px solid rgba(0,113,227,0.2);border-radius:8px;
      font-family:'Inter',sans-serif;font-size:12px;font-weight:600;
      cursor:pointer;transition:all 0.15s;white-space:nowrap;
    }
    .btn-export:hover{background:#e0eeff;}
    .btn-refresh{
      padding:7px 12px;background:#f5f5f7;color:#3a3a3c;
      border:1px solid rgba(0,0,0,0.08);border-radius:8px;
      font-family:'Inter',sans-serif;font-size:12px;font-weight:500;
      cursor:pointer;transition:all 0.15s;
    }
    .btn-refresh:hover{background:#ebebeb;}

    .adm-panel-body{padding:20px 24px;}

    /* stats row */
    .adm-stats{
      display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px;
    }
    .adm-stat{
      background:#f5f5f7;border-radius:10px;
      padding:10px 16px;flex:1;min-width:100px;
    }
    .adm-stat-val{font-size:20px;font-weight:800;color:#1d1d1f;letter-spacing:-0.5px;}
    .adm-stat-lbl{font-size:10px;color:#86868b;text-transform:uppercase;letter-spacing:0.5px;margin-top:2px;}

    /* merit table */
    .merit-wrap{overflow-x:auto;border-radius:12px;border:1px solid rgba(0,0,0,0.07);}
    .merit-table{
      width:100%;border-collapse:collapse;
      font-size:12px;
    }
    .merit-table thead tr{background:#f5f5f7;}
    .merit-table th{
      padding:10px 12px;text-align:left;
      font-size:10px;font-weight:700;color:#86868b;
      text-transform:uppercase;letter-spacing:0.8px;
      white-space:nowrap;border-bottom:1px solid rgba(0,0,0,0.07);
    }
    .merit-table td{
      padding:10px 12px;border-bottom:1px solid rgba(0,0,0,0.05);
      color:#1d1d1f;
    }
    .merit-table tbody tr:last-child td{border-bottom:none;}
    .merit-table tbody tr:hover{background:#fafafa;}
    .merit-table tbody tr:nth-child(1) .rank-cell{color:#f59e0b;font-weight:800;}
    .merit-table tbody tr:nth-child(2) .rank-cell{color:#9ca3af;font-weight:800;}
    .merit-table tbody tr:nth-child(3) .rank-cell{color:#cd7c2f;font-weight:800;}
    .rank-cell{font-size:13px;font-weight:700;text-align:center;width:40px;}
    .name-cell{font-weight:600;}
    .score-cell{font-weight:700;color:#0071e3;}
    .pct-cell{
      font-weight:700;
    }
    .time-cell{font-size:10px;color:#86868b;white-space:nowrap;}

    /* empty / loading states */
    .adm-empty{
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      padding:60px 20px;text-align:center;
    }
    .adm-empty-icon{font-size:40px;margin-bottom:14px;opacity:0.4;}
    .adm-empty-text{font-size:14px;color:#86868b;}

    .adm-error{
      background:#fff0ef;border-left:3px solid #ff3b30;
      border-radius:0 10px 10px 0;padding:14px 16px;
      font-size:13px;color:#c0392b;
    }
    .adm-warn{
      background:#fff8e1;border-left:3px solid #ff9500;
      border-radius:0 10px 10px 0;padding:14px 16px;
      font-size:13px;color:#7d4e00;
    }

    /* ── FOOTER ── */
    .adm-footer{
      text-align:center;padding:20px;
      font-size:11px;color:#aeaeb2;
      border-top:1px solid rgba(0,0,0,0.06);
    }
  </style>
</head>
<body>

<!-- HEADER -->
<header class="adm-header">
  <div class="adm-header-inner">
    <div class="adm-brand">
      <div class="adm-brand-icon">🎓</div>
      <div>
        <div class="adm-brand-name">Dr Shetye Academic Programme</div>
        <div class="adm-brand-sub">Admin Panel · Merit Lists</div>
      </div>
    </div>
    <div class="adm-header-actions">
      <a href="index.html" class="adm-back">← Back to Home</a>
    </div>
  </div>
</header>

<!-- LAYOUT -->
<div class="adm-layout">

  <!-- SIDEBAR -->
  <aside class="adm-sidebar" id="adminTabs">
    <div class="adm-sidebar-hdr">
      <div class="adm-sidebar-title">All Tests</div>
    </div>
    <!-- JS builds tabs here -->
  </aside>

  <!-- MAIN PANEL -->
  <main class="adm-panel">
    <div id="adminResultsPanel">
      <div class="adm-empty">
        <div class="adm-empty-icon">📋</div>
        <div class="adm-empty-text">Select a test from the sidebar to view results.</div>
      </div>
    </div>
  </main>

</div>

<div class="adm-footer">Dr Shetye Academic Programme · Academic Coordinator: Maitreya Hinde · 📞 7358425108</div>

<script src="config.js"></script>
<script src="admin.js"></script>
</body>
</html>
